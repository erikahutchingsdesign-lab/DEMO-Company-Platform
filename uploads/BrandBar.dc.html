<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<sc-if value="{{ show }}" hint-placeholder-val="{{ true }}">
<div style="width:100%; background:#F2E9D5; border-bottom:1px solid #E2D4B4; padding:9px 20px; display:flex; align-items:center; justify-content:center; gap:8px; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;">
  <span style="font-size:11px; font-weight:700; letter-spacing:0.07em; text-transform:uppercase; color:#9a8a5e;">Powered by</span>
  <span style="font-size:13px; font-weight:700; color:#4a4332;">{{ org }}</span>
</div>
</sc-if>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:40},&quot;org&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  constructor(props){
    super(props);
    // Paint immediately with prop override or fallback; central config refines on mount.
    this.state = { org: props.org || "Havener Capital Partners", show: true };
  }
  componentDidMount(){ this._loadCentral(); }
  async _loadCentral(){
    try{
      // cache-bust so edits to the config are always picked up on reload
      const m = await import("./brand-bar-config.js?v=" + Date.now());
      const c = (m && (m.brandBar || m.default)) || {};
      this.setState({
        // An explicit per-app `org` prop wins; otherwise the central file controls it.
        org: this.props.org || c.org || "Havener Capital Partners",
        show: c.show !== false,
      });
    }catch(e){ /* config missing — keep fallback */ }
  }
  renderVals(){
    return { org: this.state.org, show: this.state.show };
  }
}
</script>
</body>
</html>
